name: 🚀 Release MaxOS

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: 🛠️ Install
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y nasm gcc make gcc-multilib binutils -qq

      - name: 🔨 Build
        run: make

      - name: ✅ Vérifier et créer os.img
        run: |
          if [ -f os.img ] && [ "$(du -b os.img | cut -f1)" -gt 512 ]; then
            echo "✅ os.img OK: $(du -h os.img | cut -f1)"
          else
            echo "⚠️  Création manuelle de os.img..."
            BOOT=""
            KERNEL=""
            for p in build/boot.bin boot/boot.bin; do
              [ -f "$p" ] && BOOT="$p" && break
            done
            for p in build/kernel.bin build/kernel; do
              [ -f "$p" ] && KERNEL="$p" && break
            done
            if [ -z "$BOOT" ]; then
              echo "❌ boot.bin introuvable"
              echo "Contenu build/:"
              ls -la build/ 2>/dev/null || true
              exit 1
            fi
            dd if=/dev/zero of=os.img bs=512 count=2880
            dd if="$BOOT"   of=os.img conv=notrunc
            [ -n "$KERNEL" ] && dd if="$KERNEL" of=os.img seek=1 conv=notrunc
            echo "✅ os.img créé: $(du -h os.img | cut -f1)"
          fi

      - name: 📝 Générer changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | sed -n '2p' || echo "")
          if [ -n "$PREV_TAG" ]; then
            LOG=$(git log ${PREV_TAG}..HEAD --oneline --no-merges | head -20 | sed 's/^/- /' || echo "- Améliorations diverses")
          else
            LOG=$(git log --oneline --no-merges | head -20 | sed 's/^/- /' || echo "- Version initiale")
          fi
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          echo "$LOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "IMG_SIZE=$(du -h os.img | cut -f1)" >> $GITHUB_OUTPUT

      - name: 🚀 Créer la Release GitHub avec os.img
        uses: softprops/action-gh-release@v2
        with:
          files: os.img
          name: MaxOS ${{ github.ref_name }}
          body: |
            # 🖥️ MaxOS ${{ github.ref_name }}

            ## 💾 Image disquette bootable
            Télécharge **os.img** (${{ steps.changelog.outputs.IMG_SIZE }}) ci-dessous.

            ## 🚀 Tester avec QEMU
            ```bash
            qemu-system-i386 \
              -drive format=raw,file=os.img,if=floppy \
              -boot a \
              -vga std \
              -k fr \
              -m 32
            ```

            ## 📝 Changements
            ${{ steps.changelog.outputs.CHANGELOG }}

            ---
            *Généré automatiquement par MaxOS AI v16*
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}
