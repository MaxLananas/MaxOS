name: 🤖 AI Auto-Improvement

on:
  schedule:
    - cron: '0 */2 * * *'   # Toutes les 2h (au lieu de 6h)
  workflow_dispatch:          # Lancement manuel possible
    inputs:
      force_task:
        description: 'Tâche spécifique à exécuter (optionnel)'
        required: false
        default: ''

jobs:
  ai_improve:
    runs-on: ubuntu-latest
    timeout-minutes: 90       # Timeout 90min max
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🛠️ Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y nasm gcc make gcc-multilib -qq

      - name: ⚙️ Configure git
        run: |
          git config user.name "MaxOS AI Bot"
          git config user.email "ai@maxos.dev"
          git config pull.rebase true

      - name: 🤖 Run AI Developer
        env:
          GEMINI_API_KEY:   ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
          GEMINI_API_KEY_4: ${{ secrets.GEMINI_API_KEY_4 }}
          GEMINI_API_KEY_5: ${{ secrets.GEMINI_API_KEY_5 }}
          DISCORD_WEBHOOK:  ${{ secrets.DISCORD_WEBHOOK }}
          GITHUB_TOKEN:     ${{ secrets.GITHUB_TOKEN }}
          REPO_OWNER:       ${{ github.repository_owner }}
          REPO_NAME:        ${{ github.event.repository.name }}
          FORCE_TASK:       ${{ github.event.inputs.force_task }}
        run: python3 ai_dev/maxos_ai.py

      - name: 📦 Upload artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: maxos-build-${{ github.run_number }}
          path: build/os.img
          if-no-files-found: ignore
          retention-days: 7

      - name: 🔔 Notify failure
        if: failure()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          curl -s -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d '{
              "username": "MaxOS AI Bot",
              "embeds": [{
                "title": "⚠️ Cycle AI échoué",
                "description": "Le workflow GitHub Actions a échoué. Vérifier les logs.",
                "color": 16711680,
                "fields": [
                  {"name": "Run", "value": "${{ github.run_number }}", "inline": true},
                  {"name": "Lien", "value": "[Voir les logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})", "inline": false}
                ]
              }]
            }' || true
