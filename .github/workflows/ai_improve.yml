name: AI Auto-Improvement

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  ai_improve:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install tools
        run: sudo apt-get install -y nasm gcc make -qq

      - name: Configure git
        run: |
          git config user.name "MaxOS AI Bot"
          git config user.email "ai@maxos.dev"

      - name: Run AI Developer
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: python3 ai_dev/maxos_ai.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: maxos-${{ github.run_number }}
          path: build/os.img
          if-no-files-found: ignore
