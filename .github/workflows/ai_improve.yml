name: MaxOS AI Auto-Improvement v16

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      debug:
        description: 'Mode debug (0=off, 1=on)'
        required: false
        default: '0'

concurrency:
  group: ai-improvement
  cancel-in-progress: false

jobs:
  ai_improve:
    runs-on: ubuntu-latest
    timeout-minutes: 62
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y nasm gcc make gcc-multilib binutils -qq

      - name: Configure git
        run: |
          git config user.name  "MaxOS AI Bot"
          git config user.email "ai@maxos.dev"
          git config pull.rebase true
          git config push.default current
          git config rebase.autoStash true

      - name: Run MaxOS AI Developer v16
        env:
          GEMINI_API_KEY:   ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          OPENROUTER_KEY:   ${{ secrets.OPENROUTER_KEY }}
          OPENROUTER_KEY_2: ${{ secrets.OPENROUTER_KEY_2 }}
          OPENROUTER_KEY_3: ${{ secrets.OPENROUTER_KEY_3 }}
          GROQ_KEY:         ${{ secrets.GROQ_KEY }}
          GROQ_KEY_2:       ${{ secrets.GROQ_KEY_2 }}
          MISTRAL_KEY:      ${{ secrets.MISTRAL_KEY }}
          DISCORD_WEBHOOK:  ${{ secrets.DISCORD_WEBHOOK }}
          GH_PAT:           ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN:     ${{ secrets.GITHUB_TOKEN }}
          REPO_OWNER:       ${{ github.repository_owner }}
          REPO_NAME:        ${{ github.event.repository.name }}
          MAXOS_DEBUG:      ${{ github.event.inputs.debug || '0' }}
        run: python3 ai_dev/maxos_ai.py

      - name: Créer os.img si absent
        if: always()
        run: |
          if [ -f os.img ] && [ "$(du -b os.img | cut -f1)" -gt 512 ]; then
            echo "✅ os.img OK: $(du -h os.img | cut -f1)"
          else
            echo "⚠️  Tentative création os.img post-cycle..."
            BOOT=""
            KERNEL=""
            for p in build/boot.bin boot/boot.bin; do
              [ -f "$p" ] && BOOT="$p" && break
            done
            for p in build/kernel.bin build/kernel; do
              [ -f "$p" ] && KERNEL="$p" && break
            done
            if [ -n "$BOOT" ]; then
              dd if=/dev/zero of=os.img bs=512 count=2880
              dd if="$BOOT"   of=os.img conv=notrunc
              [ -n "$KERNEL" ] && dd if="$KERNEL" of=os.img seek=1 conv=notrunc
              echo "✅ os.img créé: $(du -h os.img | cut -f1)"
            else
              echo "⚠️  boot.bin absent — os.img non créé"
              echo "Fichiers build:"
              ls -la build/ 2>/dev/null || echo "(vide)"
            fi
          fi

      - name: Upload os.img
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: maxos-img-${{ github.run_number }}
          path: os.img
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload build
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: maxos-build-${{ github.run_number }}
          path: build/
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload sources
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: maxos-sources-${{ github.run_number }}
          path: |
            kernel/
            drivers/
            apps/
            boot/
            ui/
            Makefile
            linker.ld
          if-no-files-found: ignore
          retention-days: 7

      - name: Attacher os.img à la dernière release
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO:     ${{ github.repository }}
        run: |
          if [ ! -f os.img ] || [ "$(du -b os.img | cut -f1)" -lt 512 ]; then
            echo "os.img absent ou trop petit — skip upload release"
            exit 0
          fi
          RELEASE=$(curl -s \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/releases?per_page=1")
          RELEASE_ID=$(echo "$RELEASE" | python3 -c "
          import sys,json
          try:
            d=json.load(sys.stdin)
            print(d[0]['id']) if d else print('')
          except:
            print('')
          ")
          if [ -z "$RELEASE_ID" ]; then
            echo "Aucune release trouvée"
            exit 0
          fi
          echo "Upload os.img → release $RELEASE_ID"
          RESULT=$(curl -s -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @os.img \
            "https://uploads.github.com/repos/$REPO/releases/$RELEASE_ID/assets?name=os.img")
          URL=$(echo "$RESULT" | python3 -c "
          import sys,json
          try:
            d=json.load(sys.stdin)
            print(d.get('browser_download_url','erreur: '+str(d.get('errors',d))))
          except:
            print('erreur parse')
          ")
          echo "Résultat: $URL"

      - name: Notify Discord on failure
        if: failure()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          RUN_ID:          ${{ github.run_id }}
          RUN_NUMBER:      ${{ github.run_number }}
          REPO:            ${{ github.repository }}
          SERVER_URL:      ${{ github.server_url }}
        run: |
          LINK="${SERVER_URL}/${REPO}/actions/runs/${RUN_ID}"
          curl -s -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"MaxOS AI Bot\",\"embeds\":[{\"title\":\"❌ Cycle #${RUN_NUMBER} échoué\",\"description\":\"[📋 Voir les logs](${LINK})\",\"color\":16711680,\"timestamp\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"footer\":{\"text\":\"MaxOS AI v16\"}}]}" || true

      - name: Notify Discord on success
        if: success()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          RUN_NUMBER:      ${{ github.run_number }}
          REPO:            ${{ github.repository }}
          SERVER_URL:      ${{ github.server_url }}
          RUN_ID:          ${{ github.run_id }}
        run: |
          IMG_STATUS="❌ Manquant"
          [ -f os.img ] && IMG_STATUS="✅ $(du -h os.img | cut -f1)"
          LINK="${SERVER_URL}/${REPO}/actions/runs/${RUN_ID}"
          curl -s -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"MaxOS AI Bot\",\"embeds\":[{\"title\":\"✅ Cycle #${RUN_NUMBER} terminé\",\"description\":\"os.img: ${IMG_STATUS}\\n[📋 Logs](${LINK})\",\"color\":65280,\"timestamp\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"footer\":{\"text\":\"MaxOS AI v16\"}}]}" || true
