name: MaxOS AI Auto-Improvement v15

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      source:
        description: 'Source du declenchement'
        required: false
        default: 'manual'
      debug:
        description: 'Mode debug (0=off, 1=on)'
        required: false
        default: '0'

concurrency:
  group: ai-improvement
  cancel-in-progress: false

jobs:
  ai_improve:
    runs-on: ubuntu-latest
    timeout-minutes: 62
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y nasm gcc make gcc-multilib binutils -qq

      - name: Configure git
        run: |
          git config user.name  "MaxOS AI Bot"
          git config user.email "ai@maxos.dev"
          git config pull.rebase true
          git config push.default current
          git config rebase.autoStash true

      - name: Run MaxOS AI Developer v15
        env:
          GEMINI_API_KEY:   ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          OPENROUTER_KEY:   ${{ secrets.OPENROUTER_KEY }}
          OPENROUTER_KEY_2: ${{ secrets.OPENROUTER_KEY_2 }}
          OPENROUTER_KEY_3: ${{ secrets.OPENROUTER_KEY_3 }}
          GROQ_KEY:         ${{ secrets.GROQ_KEY }}
          GROQ_KEY_2:       ${{ secrets.GROQ_KEY_2 }}
          MISTRAL_KEY:      ${{ secrets.MISTRAL_KEY }}
          DISCORD_WEBHOOK:  ${{ secrets.DISCORD_WEBHOOK }}
          GITHUB_TOKEN:     ${{ secrets.GITHUB_TOKEN }}
          REPO_OWNER:       ${{ github.repository_owner }}
          REPO_NAME:        ${{ github.event.repository.name }}
          MAXOS_DEBUG:      ${{ github.event.inputs.debug || '0' }}
        run: python3 ai_dev/maxos_ai.py

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: maxos-build-${{ github.run_number }}
          path: |
            build/os.img
            build/*.bin
            build/*.elf
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload sources snapshot
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: maxos-sources-${{ github.run_number }}
          path: |
            kernel/
            drivers/
            apps/
            boot/
            ui/
            Makefile
            linker.ld
          if-no-files-found: ignore
          retention-days: 7

      - name: Notify Discord on failure
        if: failure()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          RUN_ID:          ${{ github.run_id }}
          RUN_NUMBER:      ${{ github.run_number }}
          REPO:            ${{ github.repository }}
          SERVER_URL:      ${{ github.server_url }}
        run: |
          LINK="${SERVER_URL}/${REPO}/actions/runs/${RUN_ID}"
          PAYLOAD=$(cat <<EOF
          {
            "username": "MaxOS AI Bot",
            "embeds": [{
              "title": "❌ Cycle #${RUN_NUMBER} échoué",
              "description": "Le workflow AI a échoué.\n[📋 Voir les logs](${LINK})",
              "color": 16711680,
              "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
              "footer": {"text": "MaxOS AI v15 | GitHub Actions"}
            }]
          }
          EOF
          )
          curl -s -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" || true

      - name: Notify Discord on success
        if: success()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          RUN_NUMBER:      ${{ github.run_number }}
          REPO:            ${{ github.repository }}
          SERVER_URL:      ${{ github.server_url }}
          RUN_ID:          ${{ github.run_id }}
        run: |
          LINK="${SERVER_URL}/${REPO}/actions/runs/${RUN_ID}"
          PAYLOAD=$(cat <<EOF
          {
            "username": "MaxOS AI Bot",
            "embeds": [{
              "title": "✅ Cycle #${RUN_NUMBER} terminé avec succès",
              "description": "[📋 Voir les logs](${LINK})",
              "color": 65280,
              "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
              "footer": {"text": "MaxOS AI v15 | GitHub Actions"}
            }]
          }
          EOF
          )
          curl -s -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" || true
