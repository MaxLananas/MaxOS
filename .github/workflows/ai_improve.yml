name: 🤖 AI Auto-Improvement

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  ai_improve:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🛠️ Outils
        run: sudo apt-get install -y nasm gcc make -qq

      - name: ⚙️ Git config
        run: |
          git config user.name "MaxOS AI Bot"
          git config user.email "ai@maxos.dev"

      - name: 🤖 Lancer AI
        # Passer les secrets en variables d'environnement
        # C'est plus fiable que sed !
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python3 ai_dev/maxos_ai.py

      - name: 📦 Upload
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: maxos-${{ github.run_number }}
          path: build/os.img
          if-no-files-found: ignore
