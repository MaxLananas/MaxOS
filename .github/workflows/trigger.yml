name: Health Check

on:
  workflow_dispatch:
    inputs:
      source:
        description: 'Source du déclenchement'
        required: false
        default: 'manual'

jobs:
  health:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Status
        run: |
          echo "MaxOS AI Bot — OK"
          echo "Source: ${{ github.event.inputs.source }}"
          echo "Heure: $(date -u)"
          echo "Repo: ${{ github.repository }}"

      - name: Build check
        run: |
          sudo apt-get install -y nasm gcc make gcc-multilib binutils -qq
          if make 2>&1; then
            echo "✅ Build OK"
            if [ -f os.img ]; then
              echo "✅ os.img: $(du -h os.img | cut -f1)"
            else
              # Tentative manuelle
              BOOT=""
              for p in build/boot.bin boot/boot.bin; do [ -f "$p" ] && BOOT="$p" && break; done
              if [ -n "$BOOT" ]; then
                dd if=/dev/zero of=os.img bs=512 count=2880
                dd if="$BOOT" of=os.img conv=notrunc
                KERNEL=""
                for p in build/kernel.bin build/kernel; do [ -f "$p" ] && KERNEL="$p" && break; done
                [ -n "$KERNEL" ] && dd if="$KERNEL" of=os.img seek=1 conv=notrunc
                echo "✅ os.img créé: $(du -h os.img | cut -f1)"
              else
                echo "⚠️  boot.bin absent"
                ls -la build/ 2>/dev/null || true
              fi
            fi
          else
            echo "❌ Build échoué"
            ls -la build/ 2>/dev/null || true
          fi
