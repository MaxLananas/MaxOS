name: 🔨 Build & Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 🛠️ Install
        run: sudo apt-get install -y nasm gcc make gcc-multilib binutils -qq

      - name: 🔨 Build
        run: make

      - name: ✅ Verify os.img
        run: |
          if [ ! -f os.img ]; then
            echo "❌ os.img MANQUANT"
            exit 1
          fi
          ls -lh os.img
          file os.img
          SIZE=$(du -b os.img | cut -f1)
          echo "✅ os.img: ${SIZE} bytes"
          if [ "$SIZE" -lt 512 ]; then
            echo "❌ os.img trop petit (${SIZE} < 512 bytes)"
            exit 1
          fi

      - name: 📦 Upload os.img
        uses: actions/upload-artifact@v4
        with:
          name: maxos-${{ github.sha }}
          path: os.img
          if-no-files-found: error
          retention-days: 30

      - name: 📦 Upload binaires
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: maxos-bins-${{ github.sha }}
          path: |
            build/boot.bin
            build/kernel.bin
          if-no-files-found: ignore
