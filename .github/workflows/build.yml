name: 🔨 Build & Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 🛠️ Install
        run: sudo apt-get install -y nasm gcc make gcc-multilib -qq

      - name: 🔨 Build
        run: make

      - name: ✅ Verify image
        run: |
          ls -lh build/os.img
          file build/os.img
          echo "Taille: $(du -b build/os.img | cut -f1) bytes"

      - name: 📦 Upload
        uses: actions/upload-artifact@v4
        with:
          name: maxos-${{ github.sha }}
          path: build/os.img
          if-no-files-found: error
