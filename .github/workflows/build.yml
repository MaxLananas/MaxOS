name: 🔨 Build & Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 🛠️ Install
        run: sudo apt-get install -y nasm gcc make gcc-multilib binutils -qq

      - name: 🔨 Build
        run: make

      - name: ✅ Verify & fix os.img
        run: |
          # Si os.img existe déjà, vérifier sa taille
          if [ -f os.img ]; then
            SIZE=$(du -b os.img | cut -f1)
            echo "✅ os.img présent: ${SIZE} bytes"
            ls -lh os.img
          else
            echo "⚠️  os.img absent après make — tentative de création manuelle"
            # Chercher boot.bin et kernel.bin dans les emplacements courants
            BOOT=""
            KERNEL=""
            for p in build/boot.bin boot/boot.bin build/boot; do
              [ -f "$p" ] && BOOT="$p" && break
            done
            for p in build/kernel.bin build/kernel build/os.bin; do
              [ -f "$p" ] && KERNEL="$p" && break
            done
            echo "boot   : ${BOOT:-introuvable}"
            echo "kernel : ${KERNEL:-introuvable}"
            if [ -n "$BOOT" ]; then
              dd if=/dev/zero    of=os.img bs=512 count=2880
              dd if="$BOOT"     of=os.img conv=notrunc
              [ -n "$KERNEL" ] && dd if="$KERNEL" of=os.img seek=1 conv=notrunc
              echo "✅ os.img créé manuellement: $(du -h os.img | cut -f1)"
            else
              echo "❌ boot.bin introuvable — liste des fichiers build:"
              ls -la build/ 2>/dev/null || echo "(dossier build absent)"
              ls -la *.bin *.img 2>/dev/null || true
              exit 1
            fi
          fi
          # Vérification finale
          SIZE=$(du -b os.img | cut -f1)
          echo "Taille finale: ${SIZE} bytes"
          if [ "$SIZE" -lt 512 ]; then
            echo "❌ os.img trop petit"
            exit 1
          fi

      - name: 📦 Upload os.img
        uses: actions/upload-artifact@v4
        with:
          name: maxos-${{ github.sha }}
          path: os.img
          if-no-files-found: warn
          retention-days: 30

      - name: 📦 Upload binaires
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: maxos-bins-${{ github.sha }}
          path: |
            build/
          if-no-files-found: ignore
          retention-days: 7
