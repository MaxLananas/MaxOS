name: 🔨 Build & Test

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 🛠️ Installer
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y nasm gcc make

      - name: 🔨 Compiler MaxOS
        run: make

      - name: ✅ Vérifier image
        run: |
          ls -lh build/os.img
          file build/os.img

      - name: 📦 Upload image
        uses: actions/upload-artifact@v4
        with:
          name: maxos-${{ github.sha }}
          path: build/os.img
